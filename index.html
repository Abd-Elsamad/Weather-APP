<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="weather-card">
            <h1>Weather App</h1>
            <div class="search-box">
                <input
                class="city-input"
                 type="text"
                placeholder="Enter city name"
                >
                <button class="search-btn">Search</button>
            </div>
            <div class="weather-info">
                <img 
                src="/img/final rain.png"
                 alt="Weather Icon"
                 class="weather-icon">
                <h2 class="temperature">14°C</h2>
                <h3 class="city-name">Cairo</h3>
                <p class="weather-status">Rainy</p>
            </div>
<!-- معلومات الطقس الإضافية -->
        <div class="details">
        <div class="detail-box">
            <h4 >💧 Humidity</h4>
            <p class="humidity">60%</p>
        </div>
        <div class="detail-box">

            <h4 >🌬 Wind</h4>

            <p class="wind">10 km/h</p>

        </div>

</div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
